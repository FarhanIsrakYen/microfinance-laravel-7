services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: micro-finance-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - vendor:/var/www/vendor
      - ./storage:/var/www/storage
    networks:
      - micro-finance
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: micro-finance-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - micro-finance
    depends_on:
      - app

  db:
    image: mysql:5.7
    container_name: micro-finance-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: micro_finance
      MYSQL_USER: mf_user
      MYSQL_PASSWORD: mf_secret
      MYSQL_ROOT_PASSWORD: root_secret
    ports:
      - "3307:3306"
    volumes:
      - micro-finance-db:/var/lib/mysql
    networks:
      - micro-finance
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  micro-finance:
    driver: bridge

volumes:
  micro-finance-db:
    driver: local
  vendor:
    driver: local
